##
# Access to Memory (AtoM) – psis.theahg.co.za WITH IIIF SUPPORT
# Updated: 2025-01-08 - Added bot protection
##

server {
    listen 80;
    listen [::]:80;
    server_name psis.theahg.co.za;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name psis.theahg.co.za;

    client_max_body_size 2G;

    root /usr/share/nginx/archive;
    index index.php index.html;

    ssl_certificate     /etc/letsencrypt/live/theahg.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/theahg.ddns.net/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/theahg.ddns.net/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/psis_access.log;
    error_log  /var/log/nginx/psis_error.log;

    # ======================================
    # SECURITY HEADERS
    # ======================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ======================================
    # BOT PROTECTION (uses maps from conf.d)
    # ======================================

    # Block bad bots by user agent (bypass API endpoints via $api_bypass map)
    set $block_bot 0;
    if ($bad_bot) {
        set $block_bot 1;
    }
    if ($api_bypass) {
        set $block_bot 0;
    }
    if ($block_bot) {
        return 444;
    }
    
    # Block listed IPs
    if ($blocked_ip) {
        return 403;
    }

    # ======================================
    # CORS HEADERS FOR UPLOADS (for canvas/annotator)
    # ======================================
    location /uploads/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ======================================
    # GENERIC ICONS (AtoM digital object placeholders)
    # ======================================
    location /generic-icons/ {
        alias /usr/share/nginx/archive/images/generic-icons/;
    }

    # ======================================
    # BLOCK COMMON PHP EXPLOIT SCANNERS
    # ======================================
    location ~* (eval-stdin\.php|phpunit|pearcmd|thinkphp|invokefunction|\.env|\.git|shell|cmd) {
        return 444;
    }

    # Block attempts to include remote files
    if ($query_string ~* "allow_url_include" ) { return 444; }
    if ($query_string ~* "auto_prepend_file" ) { return 444; }

    # ======================================
    # BLOCK PATH TRAVERSAL
    # ======================================
    if ($request_uri ~ "\.\./") { return 444; }
    if ($request_uri ~ "\.%2e%2e/") { return 444; }

    # ======================================
    # RATE-LIMITED BROWSE ENDPOINTS (bot targets)
    # ======================================
    
    # GLAM browse - heavy bot target
    location ~ ^/index\.php/glam/browse {
        limit_req zone=browse_limit burst=10 nodelay;
        limit_conn conn_limit 5;
        
        include fastcgi_params;
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_index index.php;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }
    
    # Information object browse
    location ~ ^/index\.php/informationobject/browse {
        limit_req zone=browse_limit burst=10 nodelay;
        limit_conn conn_limit 5;
        
        include fastcgi_params;
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_index index.php;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }
    
    # Search endpoint
    location ~ ^/index\.php/.*/search {
        limit_req zone=search_limit burst=15 nodelay;
        limit_conn conn_limit 10;
        
        include fastcgi_params;
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_index index.php;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ======================================
    # RiC EXPLORER & APIs
    # ======================================
    
    # RiC Explorer - serve static files (must be before PHP handlers)
    location ^~ /ric/ {
        alias /usr/share/nginx/archive/web/ric/;
        index index.html;
        try_files $uri $uri/ =404;
    }
    
    # RiC Semantic Search API proxy
    location ^~ /api/ric/ {
        proxy_pass http://127.0.0.1:5001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 30;
        proxy_read_timeout 30;
    }

    # RiC Provenance API
    location ^~ /api/provenance/ {
        proxy_pass http://127.0.0.1:5003/api/provenance/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # RiC Editor API
    location ^~ /api/editor/ {
        proxy_pass http://127.0.0.1:5002/api/editor/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPARQL Proxy for RiC Explorer
    location ^~ /sparql/ {
        proxy_pass http://192.168.0.112:3030/ric/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 30;
        proxy_read_timeout 180;
        proxy_send_timeout 180;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
    }

    # RiC Dashboard
    location ^~ /ric-dashboard/ {
        alias /usr/share/nginx/archive/web/ric-dashboard/;
        index index.php index.html;
        
        location ~ \.php$ {
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
        }
    }

    # RiC Provenance UI
    location ^~ /ric-provenance/ {
        alias /usr/share/nginx/archive/web/ric-provenance/;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # RiC Editor UI
    location ^~ /ric-editor/ {
        alias /usr/share/nginx/archive/web/ric-editor/;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # ======================================
    # MEDIA & IIIF EXTENSION ROUTES
    # ======================================
    include /usr/share/nginx/archive/atom-framework/config/nginx/extensions.conf;

    # ======================================
    # HERATIO (STANDALONE LARAVEL KERNEL)
    # ======================================
    include /usr/share/nginx/archive/atom-framework/config/nginx/heratio.conf;

    # ======================================
    # PHP HANDLING
    # ======================================
