# =============================================================================
# ahgRicExplorerPlugin Routing Configuration
# =============================================================================

# RIC Dashboard Routes
ric_dashboard_index:
  url: /admin/ric
  param: { module: ricDashboard, action: index }

ric_dashboard_sync_status:
  url: /admin/ric/sync-status
  param: { module: ricDashboard, action: syncStatus }

ric_dashboard_orphans:
  url: /admin/ric/orphans
  param: { module: ricDashboard, action: orphans }

ric_dashboard_queue:
  url: /admin/ric/queue
  param: { module: ricDashboard, action: queue }

ric_dashboard_logs:
  url: /admin/ric/logs
  param: { module: ricDashboard, action: logs }

ric_dashboard_config:
  url: /admin/ric/config
  param: { module: ricDashboard, action: config }

# AJAX Endpoints
ric_ajax_stats:
  url: /admin/ric/ajax/stats
  param: { module: ricDashboard, action: ajaxStats }

ric_ajax_integrity_check:
  url: /admin/ric/ajax/integrity-check
  param: { module: ricDashboard, action: ajaxIntegrityCheck }

ric_ajax_cleanup_orphans:
  url: /admin/ric/ajax/cleanup-orphans
  param: { module: ricDashboard, action: ajaxCleanupOrphans }

ric_ajax_resync:
  url: /admin/ric/ajax/resync
  param: { module: ricDashboard, action: ajaxResync }

ric_ajax_queue_item:
  url: /admin/ric/ajax/queue-item
  param: { module: ricDashboard, action: ajaxClearQueueItem }

ric_ajax_update_orphan:
  url: /admin/ric/ajax/update-orphan
  param: { module: ricDashboard, action: ajaxUpdateOrphan }

# RiC Explorer AJAX endpoints (uses /ricExplorer/ to avoid nginx /ric/ static file location)
ric_explorer_get_data:
  url: /ricExplorer/getData
  param: { module: ricExplorer, action: getData }

ric_explorer_autocomplete:
  url: /ricExplorer/autocomplete
  param: { module: ricExplorer, action: autocomplete }

# SHACL validation (RiC-O parity)
ric_shacl_index:
  url: /admin/ric/shacl
  param: { module: ricShacl, action: index }

ric_shacl_run:
  url: /admin/ric/shacl/run
  param: { module: ricShacl, action: run }

ric_shacl_report:
  url: /admin/ric/shacl/report/:id
  param: { module: ricShacl, action: report }
  requirements: { id: '\d+' }

ric_shacl_ajax_validate_entity:
  url: /ricShacl/ajaxValidateEntity
  param: { module: ricShacl, action: ajaxValidateEntity }

# Provenance graph (#149 strand 3) — relational chain-of-custody view
ric_provenance_graph:
  url: /ricExplorer/provenance
  param: { module: ricExplorer, action: provenanceGraph }

ric_provenance_graph_id:
  url: /ricExplorer/provenance/:id
  param: { module: ricExplorer, action: provenanceGraph }
  requirements: { id: \d+ }
