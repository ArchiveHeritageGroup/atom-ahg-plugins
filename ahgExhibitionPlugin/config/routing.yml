# Exhibition Space routes — URL scheme mirrors Heratio (/exhibition-space/...).
# NB: literal-segment routes (browse, add, placement) MUST precede the bare
# /:slug route, or Symfony's first-match would treat "browse" as a slug.

exhibition_space_browse:
  url: /exhibition-space/browse
  param: { module: exhibitionSpace, action: browse }

exhibition_space_create:
  url: /exhibition-space/add
  param: { module: exhibitionSpace, action: create }

exhibition_space_generate:
  url: /exhibition-space/generate
  param: { module: exhibitionSpace, action: generate }

exhibition_space_remove_placement:
  url: /exhibition-space/placement/:id/remove
  param: { module: exhibitionSpace, action: removePlacement }
  requirements: { id: \d+ }

exhibition_space_edit:
  url: /exhibition-space/:slug/edit
  param: { module: exhibitionSpace, action: edit }

exhibition_space_builder:
  url: /exhibition-space/:slug/builder
  param: { module: exhibitionSpace, action: builder }

exhibition_space_builder_layout:
  url: /exhibition-space/:slug/builder/layout
  param: { module: exhibitionSpace, action: saveLayout }

exhibition_space_walkthrough:
  url: /exhibition-space/:slug/walkthrough
  param: { module: exhibitionSpace, action: walkthrough }

exhibition_space_plan:
  url: /exhibition-space/:slug/plan
  param: { module: exhibitionSpace, action: plan }

exhibition_space_analytics:
  url: /exhibition-space/:slug/analytics
  param: { module: exhibitionSpace, action: analytics }

exhibition_space_forecast:
  url: /exhibition-space/:slug/forecast
  param: { module: exhibitionSpace, action: forecast }

exhibition_space_delete:
  url: /exhibition-space/:slug/delete
  param: { module: exhibitionSpace, action: confirmDelete }

exhibition_space_destroy:
  url: /exhibition-space/:slug/destroy
  param: { module: exhibitionSpace, action: destroy }

exhibition_space_place:
  url: /exhibition-space/:slug/place
  param: { module: exhibitionSpace, action: place }

exhibition_space_save_room:
  url: /exhibition-space/:slug/save-room
  param: { module: exhibitionSpace, action: saveRoom }

