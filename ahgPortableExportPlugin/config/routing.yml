# ahgPortableExportPlugin routes
# Routes are registered via RouteLoader in Configuration class.
# This file exists for documentation/reference only.

# Export routes
# portable_export_index:           /portable-export                    → index
# portable_export_api_start:       /portable-export/api/start          → apiStartExport
# portable_export_api_quick_start: /portable-export/api/quick-start    → apiQuickStart
# portable_export_api_clipboard:   /portable-export/api/clipboard-export → apiClipboardExport
# portable_export_api_fonds_search:/portable-export/api/fonds-search   → apiFondsSearch
# portable_export_api_progress:    /portable-export/api/progress       → apiProgress
# portable_export_api_list:        /portable-export/api/list           → apiList
# portable_export_api_delete:      /portable-export/api/delete         → apiDelete
# portable_export_api_token:       /portable-export/api/token          → apiToken
# portable_export_api_estimate:    /portable-export/api/estimate       → apiEstimate
# portable_export_download:        /portable-export/download           → download

# Import routes
# portable_export_import:              /portable-export/import             → import
# portable_export_api_start_import:    /portable-export/api/start-import   → apiStartImport
# portable_export_api_import_progress: /portable-export/api/import-progress → apiImportProgress
# portable_export_api_import_validate: /portable-export/api/import-validate → apiImportValidate
# portable_export_api_import_list:     /portable-export/api/import-list    → apiImportList
